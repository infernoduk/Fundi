<body class="bg-background min-h-screen flex flex-col font-body-md text-on-background">
<!-- Header (Nav Suppressed per Rules for Transactional Page) -->
<header class="w-full flex justify-center py-lg bg-surface border-b border-outline-variant shadow-sm z-10 sticky top-0">
<a class="font-headline-lg text-headline-lg font-black text-primary-container flex items-center gap-xs" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">handyman</span>
            Fundi
        </a>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center p-margin-mobile md:p-margin-desktop">
<div class="w-full max-w-[480px] bg-surface-container-lowest rounded-xl shadow-[0_10px_15px_rgba(30,41,59,0.1)] border border-surface-variant overflow-hidden">
<div class="p-lg md:p-xl space-y-lg">
<div class="mb-lg text-center">
<h1 class="font-display-lg text-display-lg text-on-surface mb-xs">Create Account</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Join Fundi to find help or offer your skills.</p>
</div>
<form class="space-y-md" id="registrationForm" onsubmit="event.preventDefault(); handleRegistration();">
<!-- Role Switcher Segmented Control -->
<div aria-label="Account Role" class="bg-surface-container rounded-lg p-1 flex relative mb-xl" role="group">
<input checked="" class="sr-only peer/customer focus:ring-primary-container" id="roleCustomer" name="role" onchange="toggleWorkerFields()" type="radio" value="customer">
<label class="flex-1 text-center py-2 rounded-md font-label-md text-label-md cursor-pointer transition-all text-on-surface-variant peer-checked/customer:bg-primary-container peer-checked/customer:text-on-primary peer-checked/customer:shadow-sm" for="roleCustomer">Customer</label>
<input class="sr-only peer/worker focus:ring-primary-container" id="roleWorker" name="role" onchange="toggleWorkerFields()" type="radio" value="worker">
<label class="flex-1 text-center py-2 rounded-md font-label-md text-label-md cursor-pointer transition-all text-on-surface-variant peer-checked/worker:bg-primary-container peer-checked/worker:text-on-primary peer-checked/worker:shadow-sm" for="roleWorker">Worker</label>
</div>
<!-- Personal Info Fields -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-base" for="fullName">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant flex items-center justify-center">person</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 transition-colors focus:ring-primary-container" id="fullName" placeholder="John Doe" required="" type="text">
</div>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface mb-base" for="phone">Phone Number</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant flex items-center justify-center">phone</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 transition-colors focus:ring-primary-container" id="phone" placeholder="+1 (555) 000-0000" required="" type="tel">
</div>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface mb-base" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant flex items-center justify-center">lock</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 transition-colors focus:ring-primary-container" id="password" placeholder="••••••••" required="" type="password">
</div>
</div>
<!-- Dynamic Worker Fields (Hidden by default) -->
<div class="hidden space-y-md pt-sm border-t border-surface-variant mt-md" id="workerFields">
<p class="font-label-md text-label-md text-primary mb-sm">Worker Details</p>
<div>
<label class="block font-label-md text-label-md text-on-surface mb-base" for="trade">Primary Trade / Skill</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant flex items-center justify-center">engineering</span>
<select class="w-full pl-10 pr-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface appearance-none transition-colors focus:ring-primary-container" id="trade">
<option disabled="" selected="" value="">Select a trade...</option>
<option value="plumbing">Plumbing</option>
<option value="electrical">Electrical</option>
<option value="carpentry">Carpentry</option>
<option value="cleaning">Cleaning Services</option>
<option value="landscaping">Landscaping</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none flex items-center justify-center">arrow_drop_down</span>
</div>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface mb-base" for="area">Service Area (City/Region)</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant flex items-center justify-center">location_on</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 transition-colors focus:ring-primary-container" id="area" placeholder="e.g. Downtown Metro" type="text">
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="pt-md mt-lg">
<button class="w-full h-14 bg-primary-container text-on-primary hover:bg-primary transition-all duration-200 rounded-lg font-headline-md text-headline-md flex items-center justify-center gap-sm shadow-sm active:scale-[0.98] hover:text-on-primary" type="submit">
                            Register Account

</button>
</div>

</div>

<p class="font-body-md text-body-md text-on-surface-variant">
                    Already have an account? 
                    <a class="font-label-md text-label-md text-primary hover:text-primary-container underline transition-colors" href="#">Log in here</a>
</p>
</div>

<footer class="bg-surface-container-highest flex flex-col md:flex-row justify-between items-center px-margin-desktop py-lg w-full border-t border-outline-variant mt-auto">

<div class="flex gap-lg">

<a class="font-body-md text-body-md text-on-surface-variant hover:text-primary transition-colors" href="#">Privacy</a>
</div>
<div class="font-body-md text-body-md text-on-surface-variant mt-md md:mt-0">© 2024 Fundi Marketplace. All rights reserved.</div>
</footer>
<script>
        function toggleWorkerFields() {
            const workerRadio = document.getElementById('roleWorker');
            const workerFields = document.getElementById('workerFields');
            const tradeInput = document.getElementById('trade');
            const areaInput = document.getElementById('area');

            if (workerRadio.checked) {
                workerFields.classList.remove('hidden');
                // Adding a slight delay for a smooth appearance effect could be done here with CSS transitions
                workerFields.classList.add('animate-fade-in'); 
                tradeInput.required = true;
                areaInput.required = true;
            } else {
                workerFields.classList.add('hidden');
                workerFields.classList.remove('animate-fade-in');
                tradeInput.required = false;
                areaInput.required = false;
            }
        }

        function handleRegistration() {
            // Basic validation is handled by HTML5 'required' attributes before this fires
            alert("Registration successful!");
            // In a real app, you would gather formData and send to API here
        }
    </script>
