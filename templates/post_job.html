{% extends "base.html" %}
{% block title %}Post a Job{% endblock %}
{% block content %}
<div class="container py-4 pb-5" style="max-width: 800px;">
    <div class="mb-4">
        <h1 class="fw-bold mb-1" style="font-size: 2rem; letter-spacing: -0.02em;">Describe Your Project</h1>
        <p class="text-slate-light">Provide details to connect with the best local professionals.</p>
    </div>

    <!-- Bento-style Form Layout -->
    <form method="POST" action="{{ url_for('post_job') }}" enctype="multipart/form-data" class="row g-4"
        id="postJobForm">

        <!-- Core Details Card -->
        <div class="col-12">
            <div class="fundi-card p-4">
                <h2 class="fs-5 fw-bold text-slate mb-4 pb-2 border-bottom">Job Essentials</h2>

                <div class="mb-4">
                    <label for="trade" class="form-label text-slate-light fw-bold small mb-1">Trade / Category</label>
                    <select class="form-select fundi-input" id="trade" name="trade" required>
                        <option value="" disabled selected>Select a trade...</option>
                        <option value="plumbing">Plumbing</option>
                        <option value="electrical">Electrical</option>
                        <option value="carpentry">Carpentry</option>
                        <option value="painting">Painting</option>
                        <option value="cleaning">Cleaning</option>
                        <option value="gardening">Gardening</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="description" class="form-label text-slate-light fw-bold small mb-1">Job
                        Description</label>
                    <textarea class="form-control fundi-input" id="description" name="description" rows="5"
                        placeholder="Describe what needs to be done. Be as specific as possible regarding materials or current state..."
                        required></textarea>
                </div>

                <!-- ============================================================ -->
                <!-- PHOTO UPLOAD – Using external JS for preview                   -->
                <!-- ============================================================ -->
                <div class="mb-2">
                    <label class="form-label text-slate-light fw-bold small mb-1">
                        Photo of the Problem <span class="text-muted">(optional)</span>
                        <i class="fas fa-info-circle text-muted ms-1"
                            title="Upload a photo so workers can see the issue before quoting."></i>
                    </label>
                    <div class="d-flex align-items-center gap-3">
                        <input type="file" class="form-control fundi-input" id="photo" name="photo" accept="image/*">
                        <small class="text-muted" style="white-space: nowrap;">Max 5MB</small>
                    </div>
                    <!-- Image Preview Container -->
                    <div id="photo_preview_container" class="mt-2" style="display: none;">
                        <img id="photo_preview" src="#" alt="Preview" class="img-fluid rounded"
                            style="max-height: 150px; border: 2px solid #22C55E;">
                        <button type="button" class="btn btn-sm btn-outline-danger ms-2"
                            onclick="clearImage('photo', 'photo_preview_container', 'photo_preview')">
                            <i class="fas fa-times"></i> Remove
                        </button>
                    </div>
                    <small class="text-muted d-block mt-1">Upload a photo so workers can see the issue.</small>
                </div>
            </div>
        </div>

        <!-- Location Details Card -->
        <div class="col-md-6">
            <div class="fundi-card h-100 p-4">
                <h2 class="fs-5 fw-bold text-slate mb-4 pb-2 border-bottom">Location</h2>

                <div class="mb-4">
                    <label for="area" class="form-label text-slate-light fw-bold small mb-1">Public Area / Neighborhood
                        <i class="fas fa-info-circle text-muted ms-1" title="Visible to all workers."></i></label>
                    <input type="text" class="form-control fundi-input" id="area" name="area"
                        placeholder="e.g., Downtown, Westside" required>
                </div>

                <div class="mb-2">
                    <label for="full_address" class="form-label text-slate-light fw-bold small mb-1">Private Exact
                        Address <i class="fas fa-info-circle text-muted ms-1"
                            title="Only shared with the hired worker."></i></label>
                    <input type="text" class="form-control fundi-input" id="full_address" name="full_address"
                        placeholder="e.g., 123 Main St, Apt 4B" required>
                </div>
            </div>
        </div>

        <!-- Logistics Card -->
        <div class="col-md-6">
            <div class="fundi-card h-100 p-4">
                <h2 class="fs-5 fw-bold text-slate mb-4 pb-2 border-bottom">Logistics</h2>

                <div class="mb-4">
                    <label for="preferredDate" class="form-label text-slate-light fw-bold small mb-1">Preferred Date
                        (Optional)</label>
                    <input type="date" class="form-control fundi-input" id="preferredDate" name="preferred_date">
                </div>

                <div class="mb-2">
                    <label class="form-label text-slate-light fw-bold small mb-1">Estimated Budget (Optional)</label>
                    <div class="d-flex align-items-center gap-2">
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0 text-muted">Ksh</span>
                            <input type="number" class="form-control fundi-input border-start-0 ps-0" id="budgetMin"
                                placeholder="Min" name="budget_min">
                        </div>
                        <span class="text-muted">-</span>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0 text-muted">Ksh</span>
                            <input type="number" class="form-control fundi-input border-start-0 ps-0" id="budgetMax"
                                placeholder="Max" name="budget_max">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Action Area -->
        <div class="col-12 mt-4 d-flex justify-content-end">
            <button type="submit"
                class="btn btn-fundi-primary py-3 px-5 fw-bold d-inline-flex align-items-center justify-content-center">
                <i class="fas fa-paper-plane me-2"></i> Post Job
            </button>
        </div>
    </form>
</div>

<!-- ============================================================ -->
<!-- JavaScript - Using external functions from main.js           -->
<!-- ============================================================ -->
<script>
    // Add event listener for the photo input using external functions
    document.addEventListener('DOMContentLoaded', function () {
        const photoInput = document.getElementById('photo');
        if (photoInput) {
            photoInput.addEventListener('change', function (e) {
                previewImage(e, 'photo', 'photo_preview_container', 'photo_preview');
            });
        }
    });
</script>
{% endblock %}
