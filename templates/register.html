{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-center align-items-center py-5">
    <div class="fundi-card w-100" style="max-width: 480px; padding: 32px;">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-slate mb-2">Create Account</h2>
            <p class="text-slate-light">Join Fundi to find help or offer your skills.</p>
        </div>

        <form method="POST" id="registrationForm">
            <!-- Role Switcher -->
            <div class="bg-light rounded p-1 mb-4 d-flex" role="group">
                <input type="radio" class="btn-check" name="role" id="roleCustomer" value="customer" autocomplete="off"
                    checked onchange="toggleWorkerFields()">
                <label class="btn btn-outline-primary flex-fill border-0 fw-bold" for="roleCustomer">Customer</label>

                <input type="radio" class="btn-check" name="role" id="roleWorker" value="worker" autocomplete="off"
                    onchange="toggleWorkerFields()">
                <label class="btn btn-outline-primary flex-fill border-0 fw-bold" for="roleWorker">Worker</label>
            </div>

            <!-- Personal Info Fields -->
            <div class="mb-3">
                <label class="form-label text-slate fw-bold mb-1">Full Name</label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0 text-slate-light"><i
                            class="fas fa-user"></i></span>
                    <input type="text" name="name" class="form-control border-start-0 fundi-input ps-0"
                        placeholder="John Doe" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label text-slate fw-bold mb-1">Phone Number</label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0 text-slate-light"><i
                            class="fas fa-phone"></i></span>
                    <input type="text" name="phone" class="form-control border-start-0 fundi-input ps-0"
                        placeholder="254700000000" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label text-slate fw-bold mb-1">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0 text-slate-light"><i
                            class="fas fa-lock"></i></span>
                    <input type="password" name="password" class="form-control border-start-0 fundi-input ps-0"
                        placeholder="••••••••" required>
                </div>
            </div>

            <!-- Dynamic Worker Fields -->
            <div id="workerFields" class="d-none border-top pt-3 mt-3">
                <p class="text-amber fw-bold mb-3 small text-uppercase">Worker Details</p>
                <div class="mb-3">
                    <label class="form-label text-slate fw-bold mb-1">Primary Trade / Skill</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0 text-slate-light"><i
                                class="fas fa-hard-hat"></i></span>
                        <select name="trade" id="trade" class="form-select border-start-0 fundi-input ps-0">
                            <option value="" disabled selected>Select a trade...</option>
                            <option value="plumbing">Plumbing</option>
                            <option value="electrical">Electrical</option>
                            <option value="carpentry">Carpentry</option>
                            <option value="cleaning">Cleaning Services</option>
                            <option value="landscaping">Landscaping</option>
                        </select>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label text-slate fw-bold mb-1">Service Area</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0 text-slate-light"><i
                                class="fas fa-map-marker-alt"></i></span>
                        <input type="text" name="location_area" id="location_area"
                            class="form-control border-start-0 fundi-input ps-0" placeholder="e.g. Nairobi">
                    </div>
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit"
                class="btn-fundi-primary w-100 py-3 mt-2 fs-5 d-flex justify-content-center align-items-center gap-2">
                Register Account <i class="fas fa-arrow-right"></i>
            </button>
        </form>

        <div class="text-center mt-4 pt-3 border-top">
            <p class="text-slate-light mb-0">
                Already have an account? <a href="{{ url_for('login') }}"
                    class="text-amber fw-bold text-decoration-none">Log in here</a>
            </p>
        </div>
    </div>
</div>

<script>
    function toggleWorkerFields() {
        const workerRadio = document.getElementById('roleWorker');
        const workerFields = document.getElementById('workerFields');
        const tradeInput = document.getElementById('trade');
        const areaInput = document.getElementById('location_area');

        if (workerRadio.checked) {
            workerFields.classList.remove('d-none');
            tradeInput.required = true;
            areaInput.required = true;
        } else {
            workerFields.classList.add('d-none');
            tradeInput.required = false;
            areaInput.required = false;
        }
    }
</script>

{% endblock %}
